name: Generate Content API

on:
  push:
    paths:
      - 'content/**/*.md'
      - 'src/content/**/*.md'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install gray-matter

      - name: Generate content.json
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const matter = require('gray-matter');

          const articles = {};
          const events = {};
          const seasons = {};

          // Process articles
          const articleDir = 'src/content/articles';
          if (fs.existsSync(articleDir)) {
            fs.readdirSync(articleDir).filter(f => f.endsWith('.md')).forEach(file => {
              const raw = fs.readFileSync(path.join(articleDir, file), 'utf-8');
              const { data, content } = matter(raw);
              articles[data.id] = { ...data, content: content.trim() };
            });
          }

          // Process events
          const eventDir = 'src/content/events';
          if (fs.existsSync(eventDir)) {
            fs.readdirSync(eventDir).filter(f => f.endsWith('.md')).forEach(file => {
              const raw = fs.readFileSync(path.join(eventDir, file), 'utf-8');
              const { data, content } = matter(raw);
              events[data.id] = { ...data, content: content.trim() };
            });
          }

          // Process seasons
          const seasonDir = 'src/content/seasons';
          if (fs.existsSync(seasonDir)) {
            fs.readdirSync(seasonDir).filter(f => f.endsWith('.md')).forEach(file => {
              const raw = fs.readFileSync(path.join(seasonDir, file), 'utf-8');
              const { data, content } = matter(raw);
              seasons[data.id] = { ...data, content: content.trim() };
            });
          }

          const output = { articles, events, seasons, generatedAt: new Date().toISOString() };
          fs.mkdirSync('public/api', { recursive: true });
          fs.writeFileSync('public/api/content.json', JSON.stringify(output, null, 2));
          console.log('Generated content.json');
          "

      - name: Commit and Push
        uses: EndBug/add-and-commit@v9
        with:
          message: 'chore: auto-generate content API'
          add: 'public/api/content.json'
